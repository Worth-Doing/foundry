<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background: obsidian radial gradient with warm center -->
    <radialGradient id="bg" cx="50%" cy="48%" r="65%" fx="50%" fy="45%">
      <stop offset="0%" stop-color="#28262e"/>
      <stop offset="40%" stop-color="#1c1a22"/>
      <stop offset="75%" stop-color="#141318"/>
      <stop offset="100%" stop-color="#0e0d12"/>
    </radialGradient>

    <!-- Forge glow: ambient warm light from the fissure -->
    <radialGradient id="ambientGlow" cx="50%" cy="48%" r="35%">
      <stop offset="0%" stop-color="#ff8a30" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#ff6a10" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ff5500" stop-opacity="0"/>
    </radialGradient>

    <!-- Metallic gradient for the forge body -->
    <linearGradient id="metalDark" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#3a3842"/>
      <stop offset="30%" stop-color="#2e2c35"/>
      <stop offset="70%" stop-color="#24222b"/>
      <stop offset="100%" stop-color="#1e1c25"/>
    </linearGradient>

    <!-- Edge highlight (top-left light source) -->
    <linearGradient id="edgeHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Fissure glow gradients -->
    <linearGradient id="fissureCore" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff5e0"/>
      <stop offset="40%" stop-color="#ffe8c0"/>
      <stop offset="100%" stop-color="#ffd090"/>
    </linearGradient>

    <linearGradient id="fissureMid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb050"/>
      <stop offset="50%" stop-color="#ff8a20"/>
      <stop offset="100%" stop-color="#ff6500"/>
    </linearGradient>

    <linearGradient id="fissureOuter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6000"/>
      <stop offset="100%" stop-color="#cc3800"/>
    </linearGradient>

    <!-- Cursor glow -->
    <linearGradient id="cursorGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffcc70" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffaa40" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff8820" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glowWide" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowMid" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowTight" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip path for the rounded square -->
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- ==================== -->
  <!-- BASE ROUNDED SQUARE  -->
  <!-- ==================== -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle surface texture: fine diagonal lines -->
  <g clip-path="url(#iconClip)" opacity="0.025">
    <line x1="0" y1="0" x2="1024" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="1124" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="1224" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="1324" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="1424" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="1524" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="1624" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="-100" y1="0" x2="924" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="-200" y1="0" x2="824" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="-300" y1="0" x2="724" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="-400" y1="0" x2="624" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="-500" y1="0" x2="524" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="-600" y1="0" x2="424" y2="1024" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Ambient warm glow behind everything -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#ambientGlow)" clip-path="url(#iconClip)"/>

  <!-- ========================= -->
  <!-- CENTRAL FORGE FORM        -->
  <!-- Abstract anvil/shield      -->
  <!-- ========================= -->
  <g transform="translate(512, 480)">
    <!-- Forge body: abstract geometric form -->
    <!-- A shield/crucible shape — wide top, tapering bottom -->
    <path d="
      M-195,-220
      L 195,-220
      Q 220,-220  230,-195
      L 230, 80
      Q 230, 120  200, 155
      L  40, 260
      Q  10, 280  0, 280
      Q -10, 280 -40, 260
      L-200, 155
      Q-230, 120 -230, 80
      L-230,-195
      Q-220,-220 -195,-220
      Z
    " fill="url(#metalDark)" stroke="none"/>

    <!-- Metallic edge highlight (top-left bevel) -->
    <path d="
      M-195,-220
      L 195,-220
      Q 220,-220  230,-195
      L 230, 80
      Q 230, 120  200, 155
      L  40, 260
      Q  10, 280  0, 280
      Q -10, 280 -40, 260
      L-200, 155
      Q-230, 120 -230, 80
      L-230,-195
      Q-220,-220 -195,-220
      Z
    " fill="url(#edgeHighlight)" stroke="none"/>

    <!-- Top edge bevel highlight -->
    <path d="
      M-185,-220  L 185,-220  Q 210,-220  220,-200  L 220,-195
      L-220,-195  Q-210,-220  -185,-220 Z
    " fill="white" opacity="0.06"/>

    <!-- Subtle inner border -->
    <path d="
      M-195,-220
      L 195,-220
      Q 220,-220  230,-195
      L 230, 80
      Q 230, 120  200, 155
      L  40, 260
      Q  10, 280  0, 280
      Q -10, 280 -40, 260
      L-200, 155
      Q-230, 120 -230, 80
      L-230,-195
      Q-220,-220 -195,-220
      Z
    " fill="none" stroke="white" stroke-opacity="0.04" stroke-width="2"/>
  </g>

  <!-- ========================= -->
  <!-- THE LUMINOUS FISSURE      -->
  <!-- > shaped crack + cursor   -->
  <!-- ========================= -->

  <!-- Layer 1: Wide ambient glow (largest, most diffuse) -->
  <path d="M370,310 L560,480 L370,650"
        stroke="#ff5500" stroke-width="50" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glowSoft)" opacity="0.35"
        clip-path="url(#iconClip)"/>

  <!-- Layer 2: Medium glow -->
  <path d="M370,310 L560,480 L370,650"
        stroke="#ff7720" stroke-width="28" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glowWide)" opacity="0.5"/>

  <!-- Layer 3: Bright glow -->
  <path d="M370,310 L560,480 L370,650"
        stroke="url(#fissureMid)" stroke-width="14" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glowMid)" opacity="0.7"/>

  <!-- Layer 4: Hot inner glow -->
  <path d="M370,310 L560,480 L370,650"
        stroke="#ffcc66" stroke-width="7" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glowTight)" opacity="0.85"/>

  <!-- Layer 5: White-hot core -->
  <path d="M370,310 L560,480 L370,650"
        stroke="url(#fissureCore)" stroke-width="3.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ========================= -->
  <!-- TERMINAL CURSOR BAR       -->
  <!-- ========================= -->

  <!-- Cursor glow (wide) -->
  <rect x="600" y="415" width="8" height="130" rx="4"
        fill="#ff8830" opacity="0.3"
        filter="url(#glowSoft)"/>

  <!-- Cursor glow (medium) -->
  <rect x="603" y="420" width="6" height="120" rx="3"
        fill="#ffaa40" opacity="0.5"
        filter="url(#glowMid)"/>

  <!-- Cursor core -->
  <rect x="605" y="425" width="4" height="110" rx="2"
        fill="url(#cursorGrad)" opacity="0.9"/>

  <!-- Cursor white-hot center line -->
  <rect x="606.5" y="430" width="1.5" height="100" rx="0.75"
        fill="#fff5e0" opacity="0.7"/>

  <!-- ========================= -->
  <!-- MOLTEN PARTICLES / SPARKS -->
  <!-- ========================= -->
  <g clip-path="url(#iconClip)">
    <!-- Floating embers rising from the fissure -->
    <circle cx="420" cy="290" r="3" fill="#ffcc60" opacity="0.5" filter="url(#glowTight)"/>
    <circle cx="480" cy="260" r="2.5" fill="#ff9930" opacity="0.45" filter="url(#glowTight)"/>
    <circle cx="540" cy="280" r="2" fill="#ffaa40" opacity="0.4" filter="url(#glowTight)"/>
    <circle cx="395" cy="250" r="1.8" fill="#ffbb50" opacity="0.35" filter="url(#glowTight)"/>
    <circle cx="505" cy="235" r="2.2" fill="#ff8820" opacity="0.3" filter="url(#glowTight)"/>
    <circle cx="455" cy="220" r="1.5" fill="#ffcc60" opacity="0.25" filter="url(#glowTight)"/>
    <circle cx="565" cy="310" r="1.5" fill="#ff9930" opacity="0.3" filter="url(#glowTight)"/>

    <!-- Tiny sparks near the vertex of > -->
    <circle cx="555" cy="465" r="2.5" fill="#ffe8a0" opacity="0.6" filter="url(#glowTight)"/>
    <circle cx="575" cy="490" r="2" fill="#ffcc60" opacity="0.5" filter="url(#glowTight)"/>
    <circle cx="548" cy="500" r="1.8" fill="#ffbb50" opacity="0.4" filter="url(#glowTight)"/>
  </g>

  <!-- ========================= -->
  <!-- BOTTOM REFLECTION LINE    -->
  <!-- ========================= -->

  <!-- Subtle bottom edge light (reflected glow from the fissure) -->
  <g clip-path="url(#iconClip)">
    <ellipse cx="480" cy="790" rx="180" ry="8"
             fill="#ff7720" opacity="0.04"
             filter="url(#glowSoft)"/>
  </g>

  <!-- ========================= -->
  <!-- OUTER RING BEVEL          -->
  <!-- macOS-style edge          -->
  <!-- ========================= -->
  <rect width="1024" height="1024" rx="220" ry="220"
        fill="none" stroke="white" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Inner shadow at bottom for depth -->
  <rect x="3" y="3" width="1018" height="1018" rx="218" ry="218"
        fill="none" stroke="black" stroke-opacity="0.2" stroke-width="1"/>
</svg>
